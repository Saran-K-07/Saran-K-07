    @keyframes morph0f4 {
      0% { opacity: 0; }
      95.70% { opacity: 0; }
      96.00% { opacity: 1; }
      100.00% { opacity: 1; }
      100.00% { opacity: 0; }
      100% { opacity: 0; }
    }
    .morph0f4 { animation: morph0f4 2.5s step-start infinite; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

