    .val { font-weight: bold; }
    .dim { fill: #8b949e; }

    @keyframes show0 {
      0% { opacity: 0; }
      0.00% { opacity: 0; }
      0.00% { opacity: 1; }
      80.00% { opacity: 1; }
      81.00% { opacity: 0; }
      100% { opacity: 0; }
    }
    .show0 { animation: show0 2.5s ease infinite; }
    @keyframes morph0f0 {
      0% { opacity: 0; }
      79.70% { opacity: 0; }
      80.00% { opacity: 1; }
      84.00% { opacity: 1; }
      84.30% { opacity: 0; }
      100% { opacity: 0; }
    }
    .morph0f0 { animation: morph0f0 2.5s step-start infinite; }
    @keyframes morph0f1 {
      0% { opacity: 0; }
      83.70% { opacity: 0; }
      84.00% { opacity: 1; }
      88.00% { opacity: 1; }
      88.30% { opacity: 0; }
      100% { opacity: 0; }
